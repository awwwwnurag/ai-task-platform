apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: ai-task-worker:latest
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: ai-task-config
        - secretRef:
            name: ai-task-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
